<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Super AI Conductor</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #0d1117; color: #c9d1d9; min-height: 100vh; }
  header { background: #161b22; border-bottom: 1px solid #30363d; padding: 1rem 2rem; display: flex; align-items: center; gap: 1rem; }
  header h1 { font-size: 1.2rem; font-weight: 600; }
  .badge { background: #238636; color: #fff; font-size: .7rem; padding: 2px 8px; border-radius: 20px; }
  main { max-width: 1100px; margin: 2rem auto; padding: 0 1.5rem; display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
  @media(max-width:700px){ main { grid-template-columns: 1fr; } }
  .card { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 1.25rem; }
  .card h2 { font-size: .95rem; font-weight: 600; margin-bottom: 1rem; color: #58a6ff; }
  textarea, input[type=text] { width: 100%; background: #0d1117; border: 1px solid #30363d; border-radius: 6px; color: #c9d1d9; padding: .6rem; font-size: .9rem; resize: vertical; }
  textarea { min-height: 80px; }
  button { margin-top: .75rem; background: #238636; color: #fff; border: none; border-radius: 6px; padding: .5rem 1.1rem; cursor: pointer; font-size: .9rem; }
  button:hover { background: #2ea043; }
  button.secondary { background: #21262d; }
  button.secondary:hover { background: #30363d; }
  pre { background: #0d1117; border: 1px solid #30363d; border-radius: 6px; padding: .75rem; font-size: .8rem; overflow-x: auto; white-space: pre-wrap; max-height: 240px; overflow-y: auto; margin-top: .75rem; }
  .issue-list { list-style: none; max-height: 240px; overflow-y: auto; }
  .issue-list li { padding: .5rem 0; border-bottom: 1px solid #21262d; font-size: .85rem; }
  .issue-list li a { color: #58a6ff; text-decoration: none; }
  label { font-size: .85rem; color: #8b949e; display: block; margin-bottom: .35rem; }
  audio { margin-top: .75rem; width: 100%; }
  #health-dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; background: #555; margin-right: .4rem; vertical-align: middle; }
</style>
</head>
<body>
<header>
  <span id="health-dot"></span>
  <h1>Super AI Conductor</h1>
  <span class="badge">LIVE</span>
</header>
<main>
  <div class="card">
    <h2>Workflow Planner</h2>
    <label>Describe a goal</label>
    <textarea id="goal-input" placeholder="e.g. Ship v2 of the API"></textarea>
    <button onclick="runPlan()">Generate Plan</button>
    <pre id="plan-out">-</pre>
  </div>
  <div class="card">
    <h2>GitHub Issues</h2>
    <button onclick="loadIssues()">Refresh Issues</button>
    <ul class="issue-list" id="issues-list"><li style="color:#8b949e">Click Refresh...</li></ul>
  </div>
  <div class="card">
    <h2>Post Issue Comment</h2>
    <label>Issue number</label>
    <input type="text" id="issue-num" placeholder="42" style="width:120px" />
    <label style="margin-top:.75rem">Comment</label>
    <textarea id="comment-body" placeholder="Your comment"></textarea>
    <button onclick="postComment()">Post Comment</button>
    <pre id="comment-out">-</pre>
  </div>
  <div class="card">
    <h2>Text-to-Speech (xAI)</h2>
    <label>Text to speak</label>
    <textarea id="tts-text" placeholder="Hello, I am your conductor."></textarea>
    <button onclick="runTTS()">Synthesize</button>
    <audio id="tts-player" controls style="display:none"></audio>
    <pre id="tts-out">-</pre>
  </div>
  <div class="card">
    <h2>Speech-to-Text (xAI)</h2>
    <label>Upload audio file</label>
    <input type="file" id="stt-file" accept="audio/*" style="margin-top:.35rem;color:#c9d1d9" />
    <button onclick="runSTT()">Transcribe</button>
    <pre id="stt-out">-</pre>
  </div>
  <div class="card">
    <h2>Available Skills</h2>
    <button class="secondary" onclick="loadSkills()">Load Skills</button>
    <pre id="skills-out">-</pre>
  </div>
</main>
<script>
async function checkHealth() {
  try {
    const r = await fetch('/health');
    document.getElementById('health-dot').style.background = r.ok ? '#3fb950' : '#f85149';
  } catch { document.getElementById('health-dot').style.background = '#f85149'; }
}
checkHealth(); setInterval(checkHealth, 15000);
async function runPlan() {
  const goal = document.getElementById('goal-input').value.trim();
  if (!goal) return;
  document.getElementById('plan-out').textContent = 'Planning...';
  try {
    const r = await fetch('/api/plan', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({goal}) });
    document.getElementById('plan-out').textContent = JSON.stringify(await r.json(), null, 2);
  } catch(e) { document.getElementById('plan-out').textContent = 'Error: '+e.message; }
}
async function loadIssues() {
  const ul = document.getElementById('issues-list');
  ul.innerHTML = '<li>Loading...</li>';
  try {
    const r = await fetch('/api/github/issues');
    const d = await r.json();
    const issues = d.issues || [];
    ul.innerHTML = issues.length ? issues.map(i=>`<li><a href="${i.html_url}" target="_blank">#${i.number} ${i.title.replace(/</g,'&lt;')}</a></li>`).join('') : '<li style="color:#8b949e">No open issues.</li>';
  } catch(e) { ul.innerHTML = `<li style="color:#f85149">${e.message}</li>`; }
}
async function postComment() {
  const num = document.getElementById('issue-num').value.trim();
  const body = document.getElementById('comment-body').value.trim();
  if (!num || !body) return;
  document.getElementById('comment-out').textContent = 'Posting...';
  try {
    const r = await fetch('/api/github/comment', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({issue_number:Number(num),body}) });
    document.getElementById('comment-out').textContent = JSON.stringify(await r.json(), null, 2);
  } catch(e) { document.getElementById('comment-out').textContent = 'Error: '+e.message; }
}
async function runTTS() {
  const text = document.getElementById('tts-text').value.trim();
  if (!text) return;
  document.getElementById('tts-out').textContent = 'Synthesizing...';
  try {
    const r = await fetch('/api/voice/tts', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({text}) });
    if (!r.ok) throw new Error((await r.json()).error || r.status);
    const url = URL.createObjectURL(await r.blob());
    const p = document.getElementById('tts-player'); p.src=url; p.style.display='block'; p.play();
    document.getElementById('tts-out').textContent = 'Playing audio';
  } catch(e) { document.getElementById('tts-out').textContent = 'Error: '+e.message; }
}
async function runSTT() {
  const file = document.getElementById('stt-file').files[0];
  if (!file) return;
  document.getElementById('stt-out').textContent = 'Transcribing...';
  const form = new FormData(); form.append('audio', file);
  try {
    const r = await fetch('/api/voice/stt', { method:'POST', body:form });
    const d = await r.json();
    document.getElementById('stt-out').textContent = d.transcript || JSON.stringify(d, null, 2);
  } catch(e) { document.getElementById('stt-out').textContent = 'Error: '+e.message; }
}
async function loadSkills() {
  document.getElementById('skills-out').textContent = 'Loading...';
  try {
    const r = await fetch('/api/skills');
    document.getElementById('skills-out').textContent = JSON.stringify(await r.json(), null, 2);
  } catch(e) { document.getElementById('skills-out').textContent = 'Error: '+e.message; }
}
</script>
</body>
</html>
